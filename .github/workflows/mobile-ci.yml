name: Mobile CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [main, develop]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
      - ".github/CODEOWNERS"

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            mobile/node_modules
            ~/.npm
          key: ${{ runner.os }}-mobile-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mobile-

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        working-directory: mobile
        run: npm run lint

      - name: TypeScript type-check
        working-directory: mobile
        run: npm run type-check

      - name: Run Jest tests with coverage
        working-directory: mobile
        run: npm run test:coverage

  comment-pr-status:
    needs: test
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Comment test status on PR
        uses: actions/github-script@v7
        env:
          TEST_RESULT: ${{ needs.test.result }}
        with:
          script: |
            const testResult = process.env.TEST_RESULT || 'unknown';
            const isSuccess = testResult === 'success';
            const statusLine = isSuccess ? 'passed' : `not passed (${testResult})`;
            const marker = '<!-- beautlyai-mobile-ci-status -->';
            const body = `${marker}
            ### Mobile CI Status

            ![Mobile CI](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/mobile-ci.yml/badge.svg?branch=${context.payload.pull_request.head.ref})

            - ESLint: ${statusLine}
            - TypeScript: ${statusLine}
            - Jest coverage: ${statusLine}

            Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  publish-staging:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            mobile/node_modules
            ~/.npm
          key: ${{ runner.os }}-mobile-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mobile-

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --prefer-offline --no-audit

      - name: Publish to Expo staging channel
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npm run publish:staging
