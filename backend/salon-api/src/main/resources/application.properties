spring.application.name=salon-api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/beautlyai_dev
spring.datasource.username=beautlyai_admin
spring.datasource.password=dev_password_123
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis Configuration (Caffeine cache fallback if Redis unavailable)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000ms

server.port=8080

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway - disable for now
spring.flyway.enabled=false

# Caching - Redis by default, falls back to Caffeine if Redis unavailable
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# Logging
logging.level.root=INFO
logging.level.com.beautlyai.salon=DEBUG