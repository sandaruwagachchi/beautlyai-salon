spring:
  application:
    name: salon-api

  datasource:
    url: jdbc:postgresql://localhost:5433/beautlyai_dev
    username: beautlyai_admin
    password: ${SPRING_DATASOURCE_PASSWORD:dev_password_123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006,http://127.0.0.1:19006}
  aws:
    region: ap-southeast-1
    localstack:
      endpoint: http://localhost:4566
      access-key: test
      secret-key: test
  jwt:
    secret: ${JWT_SECRET_BASE64:YmVhdXRseWFpLWRldi1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi1zaG91bGQtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}
    expiration-ms: 86400000
