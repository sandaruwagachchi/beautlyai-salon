spring:
  application:
    name: salon-api

  datasource:
    url: jdbc:postgresql://postgres:5432/beautlyai_dev
    username: beautlyai_admin
    password: dev_password_123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

  cache:
    type: redis
    redis:
      time-to-live: 600000

  data:
    redis:
      host: redis
      port: 6379
      timeout: 5000ms
      connect-timeout: 5000ms
      client-type: lettuce
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 8080

logging:
  level:
    root: INFO
    com.beautlyai.salon: DEBUG

# JVM memory settings for t2.micro (1GB RAM):
# -Xms256m -Xmx512m