version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: salon-postgres
    environment:
      POSTGRES_DB: beautylai_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - salon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d beautylai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: salon-adminer
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - salon-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  salon-network:
    driver: bridge

