services:
  postgres:
    image: postgres:15-alpine
    container_name: beautlyai-postgres
    environment:
      POSTGRES_DB: beautlyai_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_INIT_ARGS: "-c shared_preload_libraries=''"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/01-create-app-user.sql:/docker-entrypoint-initdb.d/01-create-app-user.sql
    networks:
      - salon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d beautylai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3.0  # Community Edition (NO PRO!)
    container_name: beautlyai-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns
      - DEBUG=0
      - PERSISTENCE=0
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DEFAULT_REGION=ap-southeast-1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - salon-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  salon-network:
    driver: bridge